apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      color: green
  template:
    metadata:
      labels:
        app: myapp
        color: green
    spec:
      serviceAccountName: app-sa
      containers:
      - name: myapp
        image: myapp:v2
        ports:
        - containerPort: 3000
        env:
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: api-key
